<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Palette – Extract Colors From Any Image</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>Palette</h1>
      <p>Upload any image and instantly extract its colors</p>
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" hidden />
      <div class="upload-content" id="uploadContent">
        <img src="{{ url_for('static', filename='upload-icon.png') }}" class="upload-icon" alt="upload icon" />
        <p class="upload-text">Drop your image here</p>
        <p class="upload-sub">or click to browse</p>
      </div>
      <img id="preview" src="" alt="Preview" hidden />
    </div>

    <button class="extract-btn" id="extractBtn" disabled>
      Extract Colors
    </button>

    <div class="palette" id="palette"></div>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
